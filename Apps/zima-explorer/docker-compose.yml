# Zima Explorer - Docker Compose for ZimaOS App Store
# This compose is intended to be used via a 3rd-party ZimaOS App Store.

name: zima-explorer

services:
  zima-explorer:
    image: ghcr.io/ovi1337/zima-file-manager:v1.0.0
    container_name: zima-explorer
    restart: unless-stopped

    ports:
      - "8088:80"

    environment:
      - PORT=80
      # Adjust allowed roots to your ZimaOS storage layout
      - ALLOWED_ROOTS=/media,/DATA,/mnt,/home,/root

    volumes:
      # Mount your actual storage locations (read-write recommended)
      - /media:/media
      - /DATA:/DATA
      - /mnt:/mnt

    # Optional: enable if you need broader disk access
    # privileged: true

# =====================================================
# ZimaOS / CasaOS App Metadata
# =====================================================
x-casaos:
  architectures:
    - amd64
    - arm64

  main: zima-explorer

  author: ovi1337
  category: Utilities
  developer: ovi1337

  title:
    en_us: Zima Explorer
    de_de: Zima Explorer

  tagline:
    en_us: Modern dual-pane file manager for ZimaOS
    de_de: Moderner Zwei-Spalten-Dateimanager für ZimaOS

  description:
    en_us: |
      A powerful, modern file manager for ZimaOS featuring:
      - Dual-pane explorer for easy file operations
      - Drag & drop with multi-select support
      - Built-in media viewer (images, video, audio, PDF, text)
      - Upload, download, rename, delete, copy, move
      - Volume browser and detailed file statistics
    de_de: |
      Ein moderner und leistungsstarker Dateimanager für ZimaOS mit:
      - Zwei-Spalten-Explorer für einfache Dateioperationen
      - Drag & Drop mit Mehrfachauswahl
      - Integrierter Medien-Viewer (Bilder, Video, Audio, PDF, Text)
      - Upload, Download, Umbenennen, Löschen, Kopieren, Verschieben
      - Datenträger-Browser und detaillierte Datei-Statistiken

  icon: https://cdn.jsdelivr.net/gh/selfhst/icons/png/folder.png

  thumbnail: https://cdn.jsdelivr.net/gh/selfhst/icons/png/folder.png

  # screenshot_link:   # Add public screenshot URLs here if available
  #   - https://...

  tips:
    before_install:
      en_us: |
        Recommended: Make the GHCR package public for seamless installation from this store.
        See the README in this repository for instructions.
      de_de: |
        Empfehlung: GHCR-Package auf Public stellen für reibungslose Installation aus diesem Store.
        Siehe README in diesem Repository.

  ports:
    - container: "80"
      description:
        en_us: Web Interface
        de_de: Web-Oberfläche
      protocol: tcp

  volumes:
    - container: /media
      description:
        en_us: Main ZimaOS storage
      host: /media
    - container: /DATA
      description:
        en_us: ZimaOS internal data
      host: /DATA
    - container: /mnt
      description:
        en_us: Additional mounts
      host: /mnt
