name: Validate ZimaOS App Store

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose files
        run: |
          echo "Checking for docker-compose files..."
          find Apps -name "docker-compose.yml" | while read file; do
            echo "Validating $file"
            docker compose -f "$file" config --quiet || exit 1
          done
          echo "All compose files are valid."

      - name: Check for x-casaos metadata
        run: |
          echo "Checking x-casaos sections..."
          find Apps -name "docker-compose.yml" | while read file; do
            if ! grep -q "x-casaos:" "$file"; then
              echo "ERROR: $file is missing x-casaos metadata"
              exit 1
            fi
            echo "✓ $file has x-casaos"
          done
          echo "All apps have required metadata."
